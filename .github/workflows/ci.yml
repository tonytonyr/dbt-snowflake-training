name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SQLFluff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install sqlfluff sqlfluff-templater-dbt dbt-snowflake

      - name: Set up dbt profile
        run: |
          mkdir -p ~/.dbt
          cp retail_analytics/profiles.yml ~/.dbt/profiles.yml

      - name: Lint SQL
        working-directory: retail_analytics
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: sqlfluff lint models/ --dialect snowflake --templater dbt

  build:
    name: dbt build (modified models)
    runs-on: ubuntu-latest
    needs: lint
    env:
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      - name: Download production manifest
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cd.yml
          name: dbt-manifest
          path: retail_analytics/state/
        # Allow first run when no artifact exists yet
        continue-on-error: true

      - name: dbt deps
        working-directory: retail_analytics
        run: dbt deps

      - name: dbt build (state:modified+)
        working-directory: retail_analytics
        run: |
          if [ -f state/manifest.json ]; then
            dbt build --target prod --select state:modified+ --state state/
          else
            echo "No prior manifest found — running full build"
            dbt build --target prod
          fi
