name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SQLFluff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install sqlfluff sqlfluff-templater-dbt dbt-snowflake dbt-metricflow[snowflake]

      - name: Set up dbt profile
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          retail_analytics:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: NHUKSVM-HV76137
                user: tonyjrossignol
                password: "${SNOWFLAKE_PASSWORD}"
                role: TRANSFORMER
                database: ANALYTICS
                warehouse: TRANSFORMING_WH
                schema: staging
                threads: 4
          EOF

      - name: dbt deps
        working-directory: retail_analytics
        run: dbt deps

      - name: Lint SQL
        working-directory: retail_analytics
        run: sqlfluff lint models/ --dialect snowflake --templater dbt

  build:
    name: dbt build (modified models)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-snowflake dbt-metricflow[snowflake]

      - name: Set up dbt profile
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          retail_analytics:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: NHUKSVM-HV76137
                user: tonyjrossignol
                password: "${SNOWFLAKE_PASSWORD}"
                role: TRANSFORMER
                database: ANALYTICS
                warehouse: TRANSFORMING_WH
                schema: staging
                threads: 4
          EOF

      - name: Download production manifest
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cd.yml
          name: dbt-manifest
          path: retail_analytics/state/
        continue-on-error: true

      - name: dbt deps
        working-directory: retail_analytics
        run: dbt deps

      - name: Validate MetricFlow configs
        working-directory: retail_analytics
        run: mf validate-configs

      - name: dbt build (state:modified+)
        working-directory: retail_analytics
        run: |
          if [ -f state/manifest.json ]; then
            dbt build --target prod --select state:modified+ --state state/
          else
            echo "No prior manifest found — running full build"
            dbt build --target prod
          fi
