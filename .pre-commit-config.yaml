repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: ["--fix"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.1.0
    hooks:
      # Snowflake dialect — dbt models
      - id: sqlfluff-lint
        name: sqlfluff-lint-snowflake
        additional_dependencies:
          - dbt-snowflake
        args: ["--dialect", "snowflake"]
        files: ^models/
      # Postgres dialect — simulator DDL and raw queries
      - id: sqlfluff-lint
        name: sqlfluff-lint-postgres
        args: ["--dialect", "postgres"]
        files: ^simulator/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "relaxed"]
